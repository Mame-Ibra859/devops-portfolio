name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:

  release:

    name: Build Release

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run format:check

      - run: npm run lint

      - run: npm run type-check

      - run: npm run build

